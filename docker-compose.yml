version: '3.8'

services:
  # MongoDB 数据库
  mongo:
    image: mongo:7
    container_name: hair-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: hair-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  # 后端 API 服务
  api:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: hair-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/hair_appointment
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis

  # Web 管理后台
  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
    container_name: hair-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mongo-data:
  redis-data:
